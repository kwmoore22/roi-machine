<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ROI Machine — NP Digital</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#e2e8f0;font-family:'DM Sans',system-ui,sans-serif;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#161b26}
::-webkit-scrollbar-thumb{background:#252d40;border-radius:3px}
/* layout */
.app-header{background:#0f1117;border-bottom:1px solid #1e2535;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.app-nav{background:#0f1117;border-bottom:1px solid #1e2535;padding:0 24px;display:flex}
.app-main{padding:20px 24px 48px;max-width:1280px;margin:0 auto}
/* nav */
.nav-tab{padding:12px 16px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:none;color:#64748b;border-bottom:2px solid transparent;transition:all 0.15s;font-family:inherit}
.nav-tab:hover{color:#94a3b8}
.nav-tab.active{background:#1e2535;color:#e2e8f0;border-bottom-color:#3b82f6}
/* cards */
.kpi-card{background:#161b26;border:1px solid #1e2535;border-radius:8px;padding:16px}
.kpi-card.hl{border-color:rgba(59,130,246,0.4)}
.kpi-label{font-size:11px;color:#64748b;display:flex;align-items:center;gap:4px;margin-bottom:6px;flex-wrap:wrap}
.kpi-val{font-size:24px;font-weight:600;font-family:'DM Mono',monospace;color:#f1f5f9}
.kpi-val.blue{color:#3b82f6}
.kpi-sub{font-size:11px;color:#64748b;margin-top:4px}
.kpi-grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.kpi-grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.section-card{background:#161b26;border:1px solid #1e2535;border-radius:10px;padding:20px}
.sc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sc-title{font-size:14px;font-weight:600;color:#e2e8f0}
/* grids */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid3{display:grid;grid-template-columns:1fr 2fr;gap:20px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
/* badges */
.badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap;display:inline-block}
.badge-est{background:rgba(245,158,11,0.15);color:#f59e0b;border:1px solid rgba(245,158,11,0.3)}
.badge-attr{background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.3)}
.badge-gap{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3)}
.badge-info{background:rgba(59,130,246,0.15);color:#3b82f6;border:1px solid rgba(59,130,246,0.3)}
/* tooltip */
.tip-wrap{position:relative;display:inline-flex;align-items:center}
.tip-icon{width:14px;height:14px;border-radius:50%;border:1px solid #334155;color:#64748b;font-size:10px;display:inline-flex;align-items:center;justify-content:center;cursor:help;flex-shrink:0;line-height:1}
.tip-box{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#252d40;color:#cbd5e1;font-size:11px;padding:6px 10px;border-radius:5px;width:210px;text-align:center;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:200;border:1px solid #334155}
.tip-wrap:hover .tip-box{opacity:1}
/* buttons */
.btn{border:none;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.15s}
.btn-p{background:#3b82f6;color:#fff}.btn-p:hover{background:#2563eb}
.btn-s{background:#1e2535;color:#94a3b8;border:1px solid #252d40}.btn-s:hover{background:#252d40;color:#e2e8f0}
.btn-ok{background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.3)}.btn-ok:hover{background:rgba(34,197,94,0.25)}
.btn-sm{padding:5px 10px;font-size:11px}
/* inputs */
input[type=text],input[type=number],select,textarea{background:#161b26;border:1px solid #252d40;color:#e2e8f0;border-radius:6px;padding:8px 12px;font-family:inherit;font-size:13px;outline:none;transition:border-color 0.15s;width:100%}
input[type=text]:focus,input[type=number]:focus,select:focus,textarea:focus{border-color:#3b82f6}
select option{background:#161b26}
input[type=radio],input[type=checkbox]{accent-color:#3b82f6}
.flabel{font-size:11px;color:#64748b;display:block;margin-bottom:5px}
/* upload */
.upload-zone{border:2px dashed #252d40;border-radius:8px;padding:32px;text-align:center;cursor:pointer;transition:all 0.2s}
.upload-zone:hover,.upload-zone.drag{border-color:#3b82f6;background:rgba(59,130,246,0.05)}
/* empty */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center}
/* tables */
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 12px;font-size:11px;color:#64748b;border-bottom:1px solid #1e2535;white-space:nowrap}
td{padding:6px 12px;border-bottom:1px solid #161b26;font-size:12px}
tr:hover td{background:#1e2535}
.th-s{cursor:pointer;user-select:none}.th-s:hover{color:#94a3b8}
.mn{font-family:'DM Mono',monospace;font-size:12px}
.muted{color:#64748b}
.green{color:#22c55e;font-family:'DM Mono',monospace;font-size:12px}
.trunc{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* alerts */
.alert{border-radius:8px;padding:16px;display:flex;align-items:flex-start;gap:12px}
.alert-r{border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.05)}
.alert-y{border:1px solid rgba(245,158,11,0.2);background:rgba(245,158,11,0.05)}
.alert-b{border:1px solid rgba(59,130,246,0.2);background:rgba(59,130,246,0.05)}
.alert-icon{font-size:20px;flex-shrink:0;line-height:1.4}
.at-red{font-size:13px;font-weight:600;color:#ef4444;margin-bottom:4px}
.at-yel{font-size:13px;font-weight:600;color:#f59e0b;margin-bottom:4px}
.at-blu{font-size:13px;font-weight:600;color:#3b82f6;margin-bottom:4px}
.alert-body{font-size:12px;color:#94a3b8;line-height:1.5}
/* retainer bars */
.rbar-wrap{margin-bottom:14px}
.rbar-head{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px;color:#64748b}
.rbar-track{height:6px;border-radius:3px;background:#1e2535}
.rbar-fill{height:6px;border-radius:3px;transition:width 0.6s}
/* big ROI */
.roi-box{text-align:center;padding:24px 32px;border-left:1px solid #1e2535}
.roi-lbl{font-size:11px;color:#64748b;margin-bottom:8px}
.roi-num{font-size:52px;font-weight:700;font-family:'DM Mono',monospace;color:#3b82f6;line-height:1}
.roi-sub{font-size:11px;color:#64748b;margin-top:6px}
/* legend */
.leg{display:flex;gap:16px;font-size:11px;margin-top:8px;flex-wrap:wrap;justify-content:center}
.leg-item{display:flex;align-items:center;gap:6px;color:#64748b}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
/* logo */
.logo{font-size:18px;font-weight:700;letter-spacing:-0.5px;color:#fff}
.logo-a{color:#3b82f6}
/* spacing helpers */
.sy4>*+*{margin-top:16px}
.sy5>*+*{margin-top:20px}
.mt3{margin-top:12px}
.mt4{margin-top:16px}
.mb3{margin-bottom:12px}
.mb4{margin-bottom:16px}
.ow{overflow-x:auto}
@media print{.app-header,.app-nav{display:none}body{background:#fff;color:#000}}

/* ── CSS variables for embedded tools ── */
:root{
  --font-sans:'DM Sans',system-ui,sans-serif;
  --font-mono:'DM Mono',monospace;
  --color-text-primary:#e2e8f0;
  --color-text-secondary:#64748b;
  --color-background-primary:#161b26;
  --color-background-secondary:#0f1117;
  --color-border-tertiary:#1e2535;
  --color-border-secondary:#252d40;
  --color-border-primary:#3b82f6;
  --border-radius-lg:10px;
  --border-radius-md:6px;
}

/* ── Traffic Forecast panel ── */
.traffic-panel{font-family:var(--font-sans);color:var(--color-text-primary);font-size:13px}
.traffic-panel .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px}
.traffic-panel .top-bar h1{font-size:18px;font-weight:500}
.traffic-panel .top-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.traffic-panel .section-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-secondary);margin-bottom:10px}
.traffic-panel .input-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:.5rem}
.traffic-panel .input-box{border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;background:var(--color-background-primary)}
.traffic-panel .box-title{font-weight:500;font-size:13px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.traffic-panel .box-title-dot{width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0}
.traffic-panel .box-subtitle{font-size:11px;color:var(--color-text-secondary);margin-bottom:10px;line-height:1.5}
.traffic-panel textarea{width:100%;height:110px;border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 10px;font-size:12px;font-family:var(--font-mono);background:var(--color-background-secondary);color:var(--color-text-primary);resize:vertical;outline:none;transition:border-color .15s}
.traffic-panel textarea:focus{border-color:var(--color-border-primary)}
.traffic-panel .status{font-size:11px;margin-top:5px;min-height:14px;color:var(--color-text-secondary)}
.traffic-panel .ok{color:#0F6E56}.traffic-panel .err{color:#993C1D}.traffic-panel .warn{color:#854F0B}
.traffic-panel .conv-value-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.traffic-panel .conv-value-row label{font-size:11px;color:var(--color-text-secondary);white-space:nowrap}
.traffic-panel .conv-input-wrap{display:flex;align-items:center;border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);overflow:hidden;flex:1}
.traffic-panel .conv-prefix{padding:5px 7px 5px 9px;font-size:13px;color:var(--color-text-secondary);flex-shrink:0}
.traffic-panel .conv-input-wrap input[type=number]{flex:1;padding:5px 8px 5px 0;border:none;background:transparent;color:var(--color-text-primary);font-family:inherit;font-size:13px;outline:none;min-width:0}
.traffic-panel .divider{border:none;border-top:.5px solid var(--color-border-tertiary);margin:1.25rem 0}
.traffic-panel .scenario-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.traffic-panel .sbox{border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;background:var(--color-background-primary)}
.traffic-panel .sname{font-weight:500;font-size:13px;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.traffic-panel .sname-dot{width:8px;height:8px;border-radius:2px;display:inline-block}
.traffic-panel .sdesc{font-size:11px;color:var(--color-text-secondary);margin-bottom:10px;line-height:1.5}
.traffic-panel .sbox label{display:block;font-size:11px;color:var(--color-text-secondary);margin-bottom:4px}
.traffic-panel .sbox input[type=number]{width:100%;padding:6px 9px;border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);font-family:inherit;font-size:13px;outline:none;transition:border-color .15s}
.traffic-panel .sbox input[type=number]:focus{border-color:var(--color-border-primary)}
.traffic-panel .snote{font-size:11px;color:var(--color-text-secondary);margin-top:6px;min-height:14px}
.traffic-panel .roi-mode-row{display:flex;align-items:center;gap:0;margin-bottom:12px;border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden;width:fit-content}
.traffic-panel .roi-mode-btn{padding:6px 16px;font-size:12px;font-family:inherit;cursor:pointer;border:none;background:transparent;color:var(--color-text-secondary);transition:background .12s,color .12s}
.traffic-panel .roi-mode-btn.active{background:var(--color-text-primary);color:var(--color-background-primary)}
.traffic-panel .roi-mode-btn:not(.active):hover{background:var(--color-background-secondary)}
.traffic-panel .roi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.traffic-panel .roi-box{border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;background:var(--color-background-primary)}
.traffic-panel .roi-box label{display:block;font-size:11px;color:var(--color-text-secondary);margin-bottom:6px}
.traffic-panel .roi-input-wrap{display:flex;align-items:center;border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);overflow:hidden}
.traffic-panel .roi-prefix{padding:6px 8px 6px 10px;font-size:13px;color:var(--color-text-secondary);flex-shrink:0}
.traffic-panel .roi-input-wrap input[type=number]{flex:1;padding:6px 9px 6px 0;border:none;background:transparent;color:var(--color-text-primary);font-family:inherit;font-size:13px;outline:none;min-width:0}
.traffic-panel .roi-hint{font-size:11px;color:var(--color-text-secondary);margin-top:6px;line-height:1.5}
.traffic-panel .rps-derived{font-size:11px;margin-top:6px;min-height:14px}
.traffic-panel .rps-derived.active{color:#0F6E56;font-weight:500}
.traffic-panel .results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.traffic-panel .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:1.25rem}
.traffic-panel .card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px}
.traffic-panel .card .lbl{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px}
.traffic-panel .card .val{font-size:20px;font-weight:500;line-height:1.2}
.traffic-panel .card .sub{font-size:11px;color:var(--color-text-secondary);margin-top:3px}
.traffic-panel .chart-wrap{position:relative;width:100%;height:300px;margin-bottom:1.5rem}
.traffic-panel .legend{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:10px;font-size:12px;color:var(--color-text-secondary)}
.traffic-panel .legend span{display:flex;align-items:center;gap:5px}
.traffic-panel .leg-dot{width:10px;height:10px;border-radius:2px;display:inline-block;flex-shrink:0}
.traffic-panel .roi-panel{border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px;background:var(--color-background-primary);margin-bottom:1.25rem}
.traffic-panel .roi-panel-title{font-size:13px;font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.traffic-panel .roi-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.traffic-panel .roi-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px}
.traffic-panel .roi-card .lbl{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px}
.traffic-panel .roi-card .val{font-size:18px;font-weight:500;line-height:1.2}
.traffic-panel .roi-card .sub{font-size:11px;color:var(--color-text-secondary);margin-top:3px}
.traffic-panel .breakeven-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:var(--border-radius-md);font-size:12px;font-weight:500}
.traffic-panel .breakeven-badge.hit{background:#E1F5EE;color:#0F6E56}
.traffic-panel .breakeven-badge.miss{background:#FAECE7;color:#993C1D}
.traffic-panel .roi-table-wrap{overflow-x:auto}
.traffic-panel .roi-table{width:100%;border-collapse:collapse;font-size:12px}
.traffic-panel .roi-table th{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-align:left;padding:5px 8px;border-bottom:.5px solid var(--color-border-tertiary);white-space:nowrap}
.traffic-panel .roi-table td{padding:5px 8px;border-bottom:.5px solid var(--color-border-tertiary);color:var(--color-text-primary);white-space:nowrap}
.traffic-panel .roi-table tr:last-child td{border-bottom:none}
.traffic-panel .roi-table tr.be-row td{font-weight:500;background:rgba(29,158,117,.06)}
.traffic-panel .roi-table .pos{color:#0F6E56}
.traffic-panel .roi-table .neg{color:#993C1D}
.traffic-panel .roi-table .dim{color:var(--color-text-secondary)}
.traffic-panel .sub-section{margin-bottom:1.25rem}
.traffic-panel .sub-title{font-size:13px;font-weight:500;margin-bottom:3px}
.traffic-panel .sub-hint{font-size:11px;color:var(--color-text-secondary);margin-bottom:8px;line-height:1.5}
.traffic-panel .yoy-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(72px,1fr));gap:5px}
.traffic-panel .yoy-cell{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:7px 9px}
.traffic-panel .yoy-cell .ym{font-size:10px;color:var(--color-text-secondary);margin-bottom:2px}
.traffic-panel .yoy-cell .yv{font-size:12px;font-weight:500}
.traffic-panel .season-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:3px}
.traffic-panel .scell{text-align:center;border-radius:4px;padding:6px 2px}
.traffic-panel .scell .sm{font-size:10px;color:var(--color-text-secondary);margin-bottom:2px}
.traffic-panel .scell .sv{font-size:11px;font-weight:500}
.traffic-panel .hint{font-size:11px;color:var(--color-text-secondary);line-height:1.5;margin-top:6px}
.traffic-panel select{font-family:inherit;font-size:13px;color:var(--color-text-primary);border-radius:var(--border-radius-md);border:.5px solid var(--color-border-secondary);padding:5px 9px;background:transparent;cursor:pointer;outline:none}
.traffic-panel .btn{padding:6px 14px;border-radius:var(--border-radius-md);border:.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer;font-family:inherit;font-size:13px;transition:background .12s}
.traffic-panel .btn:hover{background:var(--color-background-secondary)}
.traffic-panel .btn.primary{background:var(--color-text-primary);color:var(--color-background-primary);border-color:transparent}
.traffic-panel .btn.primary:hover{opacity:.88}
.traffic-panel .toggle-label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--color-text-secondary);cursor:pointer;user-select:none}

/* ── SEO Tracker panel ── */
.tracker-panel{font-family:var(--font-sans);color:var(--color-text-primary);font-size:13px}
.tracker-panel .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px}
.tracker-panel .top-bar h1{font-size:18px;font-weight:500}
.tracker-panel .top-bar p{font-size:12px;color:var(--color-text-secondary);margin-top:3px}
.tracker-panel .section-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--color-text-secondary);margin-bottom:10px}
.tracker-panel .input-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:.5rem}
.tracker-panel .input-box{border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;background:var(--color-background-primary)}
.tracker-panel .box-title{font-weight:500;font-size:13px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.tracker-panel .box-title-dot{width:8px;height:8px;border-radius:2px;display:inline-block;flex-shrink:0}
.tracker-panel .box-subtitle{font-size:11px;color:var(--color-text-secondary);margin-bottom:10px;line-height:1.5}
.tracker-panel textarea{width:100%;height:110px;border:1px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:8px 10px;font-size:12px;font-family:var(--font-mono);background:var(--color-background-secondary);color:var(--color-text-primary);resize:vertical;outline:none;transition:border-color .15s}
.tracker-panel textarea:focus{border-color:#2175c8}
.tracker-panel .status{font-size:11px;margin-top:5px;min-height:14px}
.tracker-panel .ok{color:#0F6E56}.tracker-panel .err{color:#993C1D}.tracker-panel .warn{color:#854F0B}
.tracker-panel .conv-value-row{display:flex;align-items:center;gap:8px;margin-top:10px}

<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script>
'use strict';
const {createElement:h,Fragment,useState,useMemo,useRef,useCallback,useEffect}=React;

// ── Formatters ────────────────────────────────────────────────────────────────
const fmt$=v=>(v==null||isNaN(v))?'—':'$'+Number(v).toLocaleString('en-US',{maximumFractionDigits:0});
const fmtN=v=>(v==null||isNaN(v))?'—':Number(v).toLocaleString('en-US');
const fmtP=(v,d=1)=>(v==null||isNaN(v))?'—':Number(v).toFixed(d)+'%';
const fmtX=v=>(v==null||isNaN(v))?'—':Number(v).toFixed(2)+'x';

// ── Primitives ────────────────────────────────────────────────────────────────
function Tip({text}){
  return h('span',{className:'tip-wrap',style:{marginLeft:4}},
    h('span',{className:'tip-icon'},'?'),
    h('span',{className:'tip-box'},text)
  );
}

function Badge({type,children}){
  const cls={est:'badge badge-est',attr:'badge badge-attr',gap:'badge badge-gap',info:'badge badge-info'}[type]||'badge badge-info';
  return h('span',{className:cls},children);
}

function KPI({label,value,sub,badge,tip,hl}){
  return h('div',{className:'kpi-card'+(hl?' hl':'')},
    h('div',{className:'kpi-label'},label,tip&&h(Tip,{text:tip}),badge&&h('span',{style:{marginLeft:'auto'}},badge)),
    h('div',{className:'kpi-val'+(hl?' blue':'')},value),
    sub&&h('div',{className:'kpi-sub'},sub)
  );
}

function Card({title,children,action}){
  return h('div',{className:'section-card'},
    (title||action)&&h('div',{className:'sc-header'},
      title&&h('div',{className:'sc-title'},title),
      action
    ),
    children
  );
}

function Empty({icon,title,desc}){
  return h('div',{className:'empty'},
    h('div',{style:{fontSize:36,marginBottom:12}},icon),
    h('div',{style:{fontWeight:500,color:'#94a3b8',marginBottom:4}},title),
    h('div',{style:{fontSize:12,color:'#64748b',maxWidth:260}},desc)
  );
}

function Uploader({onParsed,label,hint}){
  const [drag,setDrag]=useState(false);
  const [busy,setBusy]=useState(false);
  const ref=useRef();
  const parse=f=>{
    setBusy(true);
    Papa.parse(f,{header:true,skipEmptyLines:true,
      complete:r=>{setBusy(false);onParsed(r.data,r.meta.fields||[]);},
      error:()=>setBusy(false)
    });
  };
  return h('div',{
    className:'upload-zone'+(drag?' drag':''),
    onDragOver:ev=>{ev.preventDefault();setDrag(true);},
    onDragLeave:()=>setDrag(false),
    onDrop:ev=>{ev.preventDefault();setDrag(false);const f=ev.dataTransfer.files[0];if(f)parse(f);},
    onClick:()=>ref.current.click()
  },
    h('input',{ref,type:'file',accept:'.csv',style:{display:'none'},onChange:ev=>{if(ev.target.files[0])parse(ev.target.files[0]);}}),
    busy?h('div',{style:{color:'#64748b',fontSize:13}},'Parsing CSV…')
      :h(Fragment,null,
        h('div',{style:{fontSize:28,marginBottom:8}},'📂'),
        h('div',{style:{fontSize:13,fontWeight:500,color:'#94a3b8',marginBottom:4}},label||'Drop CSV here or click to upload'),
        hint&&h('div',{style:{fontSize:11,color:'#64748b'}},hint)
      )
  );
}

// ── SVG Gauge ─────────────────────────────────────────────────────────────────
function Gauge({score,size=130}){
  const r=44,cx=size/2,cy=size/2;
  const circ=2*Math.PI*r,arc=circ*0.75;
  const off=arc-(Math.min(100,Math.max(0,score))/100)*arc;
  const col=score>=70?'#22c55e':score>=40?'#f59e0b':'#ef4444';
  const lbl=score>=70?'Healthy':score>=40?'Fair':'At Risk';
  const base={cx,cy,r,fill:'none',strokeWidth:10};
  return h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center'}},
    h('svg',{width:size,height:size*0.8,viewBox:`0 0 ${size} ${size}`},
      h('circle',{...base,stroke:'#1e2535',strokeDasharray:`${arc} ${circ}`,style:{transformOrigin:`${cx}px ${cy}px`,transform:'rotate(135deg)'}}),
      h('circle',{...base,stroke:col,strokeLinecap:'round',strokeDasharray:`${arc} ${circ}`,strokeDashoffset:off,style:{transformOrigin:`${cx}px ${cy}px`,transform:'rotate(135deg)',transition:'stroke-dashoffset 0.8s ease'}}),
      h('text',{x:cx,y:cy+6,textAnchor:'middle',fill:'#e2e8f0',fontSize:22,fontWeight:600,fontFamily:'DM Mono,monospace'},score),
      h('text',{x:cx,y:cy+22,textAnchor:'middle',fill:col,fontSize:11},lbl)
    ),
    h('div',{style:{fontSize:11,color:'#64748b',marginTop:4}},'List Health Score')
  );
}

// ── SVG Donut ─────────────────────────────────────────────────────────────────
function Donut({data,colors}){
  const sz=200,r=72,cx=sz/2,cy=sz/2,circ=2*Math.PI*r;
  const total=data.reduce((s,d)=>s+d.value,0);
  if(!total)return null;
  let cum=0;
  const segs=data.map((d,i)=>{
    const len=(d.value/total)*circ;
    const s={...d,len,off:-cum,col:colors[i%colors.length]};
    cum+=len;return s;
  });
  return h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center'}},
    h('svg',{width:sz,height:sz,viewBox:`0 0 ${sz} ${sz}`},
      h('circle',{cx,cy,r,fill:'none',stroke:'#1e2535',strokeWidth:28}),
      ...segs.map((s,i)=>h('circle',{key:i,cx,cy,r,fill:'none',stroke:s.col,strokeWidth:28,
        strokeDasharray:`${s.len} ${circ-s.len}`,strokeDashoffset:s.off,
        style:{transform:'rotate(-90deg)',transformOrigin:`${cx}px ${cy}px`}
      }))
    ),
    h('div',{className:'leg'},
      ...data.map((d,i)=>h('div',{key:i,className:'leg-item'},
        h('div',{className:'leg-dot',style:{background:colors[i%colors.length]}}),d.name
      ))
    )
  );
}

    {campaign:'Meta | Prospecting',platform:'Meta Ads',impressions:520000,clicks:7800,spend:9800,conversions:62,conversionValue:9300},
    {campaign:'Meta | Retargeting',platform:'Meta Ads',impressions:145000,clicks:4350,spend:6200,conversions:94,conversionValue:14100},
    {campaign:'Meta | Lookalike',platform:'Meta Ads',impressions:280000,clicks:4200,spend:7400,conversions:45,conversionValue:6750},
    {campaign:'Meta | UGC Creative Test',platform:'Meta Ads',impressions:98000,clicks:1960,spend:3100,conversions:28,conversionValue:4200},

  const platTotal=paid.reduce((s,c)=>s+c.conversionValue,0);
  const crm={leads:872,mqls:312,sqls:198,closedWon:706,revenue:Math.floor(platTotal*0.85)};
  const email=[
    {campaign:'May Newsletter',sends:28400,opens:6532,clicks:1136,revenue:8420},

// ── CTR curves ────────────────────────────────────────────────────────────────
const CURVES={
  ecommerce:{1:28.5,2:15.7,3:11.0,4:7.9,5:6.1,6:4.8,7:3.8,8:3.1,9:2.6,10:2.2},
  b2b:{1:19.3,2:10.6,3:7.4,4:5.1,5:4.0,6:3.2,7:2.6,8:2.1,9:1.8,10:1.5}
};
function expCTR(pos,preset){
  const c=CURVES[preset]||CURVES.ecommerce;
  const p=Math.round(Math.max(1,Math.min(10,pos)));
  return(c[p]||Math.max(0.5,10.5/pos))/100;
}

// ── Organic SEO ───────────────────────────────────────────────────────────────
function SEOView({cfg,data,setData}){
  const [filt,setFilt]=useState('');
  const [sk,setSk]=useState('clicks');
  const [sd,setSd]=useState(-1);
  const [pg,setPg]=useState(0);
  const PER=20;
  const isEst=cfg.revenueModel!=='ecommerce';
  const rpc=cfg.revenueModel==='leadgen'?cfg.dealValue*(cfg.closeRate/100):cfg.aov;

  const rows=useMemo(()=>{
    let r=data.filter(d=>!filt||(d.query||'').toLowerCase().includes(filt.toLowerCase()));
    return[...r].sort((a,b)=>sd*((+a[sk]||0)-(+b[sk]||0)));
  },[data,filt,sk,sd]);

  const tc=useMemo(()=>rows.reduce((s,r)=>s+(+r.clicks||0),0),[rows]);
  const ti=useMemo(()=>rows.reduce((s,r)=>s+(+r.impressions||0),0),[rows]);
  const avgCTR=ti?tc/ti*100:0;
  const avgPos=useMemo(()=>{const v=rows.filter(r=>+r.position>0);return v.length?v.reduce((s,r)=>s+(+r.position||0),0)/v.length:0;},[rows]);
  const rev=tc*(cfg.convRate/100)*rpc;

  const opps=useMemo(()=>data
    .filter(r=>+r.position>=4&&+r.position<=20)
    .map(r=>{
      const cur=(+r.ctr||0)/100;
      const tgt=expCTR(2,cfg.ctrPreset);
      const gain=Math.max(0,(tgt-cur)*(+r.impressions||0));
      return{...r,gain,impact:gain*(cfg.convRate/100)*rpc};
    })
    .filter(r=>r.gain>0)
    .sort((a,b)=>b.impact-a.impact)
    .slice(0,15)
  ,[data,cfg]);

  const sort=k=>{if(sk===k)setSd(d=>-d);else{setSk(k);setSd(-1);}};
  const TH=(k,lbl)=>h('th',{className:'th-s',onClick:()=>sort(k)},lbl,sk===k?(sd>0?' ↑':' ↓'):'');
  const pages=Math.ceil(rows.length/PER);
  const paged=rows.slice(pg*PER,(pg+1)*PER);
  const rb=h(Badge,{type:isEst?'est':'attr'},isEst?'Est.':'Attr.');

  return h('div',{className:'sy5',style:{paddingTop:16}},
    h('div',{className:'kpi-grid5'},
      h(KPI,{label:'Total Clicks',value:fmtN(tc),tip:'Total clicks from Google Search Console'}),
      h(KPI,{label:'Impressions',value:fmtN(ti),tip:'Total impressions across all queries'}),
      h(KPI,{label:'Avg CTR',value:fmtP(avgCTR),tip:'Clicks ÷ Impressions'}),
      h(KPI,{label:'Avg Position',value:avgPos>0?avgPos.toFixed(1):'—',tip:'Average ranking position'}),
      h(KPI,{label:isEst?'Est. Organic Revenue':'Organic Revenue',value:fmt$(rev),hl:true,badge:rb,tip:'Clicks × Conversion Rate × Revenue per Conversion'})
    ),

    opps.length>0&&h(Card,{title:'Keyword Opportunity Model'},
      h('p',{style:{fontSize:12,color:'#64748b',marginBottom:12}},'Queries ranking 4–20. Estimated traffic and revenue gain if moved to position 2 using the ',(cfg.ctrPreset==='b2b'?'B2B':'Ecommerce'),' CTR curve.'),
      h('div',{className:'ow'},
        h('table',null,
          h('thead',null,h('tr',null,
            h('th',null,'Query'),h('th',null,'Cur. Pos.'),h('th',null,'Impressions'),
            h('th',null,'Clicks (now)'),h('th',null,'Traffic Gain'),h('th',null,'Revenue Impact')
          )),
          h('tbody',null,...opps.map((r,i)=>h('tr',{key:i},
            h('td',{className:'trunc',style:{maxWidth:240}},r.query),
            h('td',{className:'mn'},(+r.position).toFixed(1)),
            h('td',{className:'mn'},fmtN(+r.impressions)),
            h('td',{className:'mn'},fmtN(+r.clicks)),
            h('td',{className:'green'},'+',fmtN(Math.round(r.gain))),
            h('td',{className:'green'},'+',fmt$(r.impact))
          )))
        )
      )
    ),

    h(Card,{
      title:`Query Data (${fmtN(rows.length)} rows)`,
      action:h('input',{type:'text',placeholder:'Filter queries…',value:filt,
        onChange:ev=>{setFilt(ev.target.value);setPg(0);},
        style:{width:200,padding:'6px 10px',fontSize:12}})
    },
      data.length===0
        ?h(Fragment,null,
            h(Empty,{icon:'🔍',title:'No GSC data loaded',desc:'Upload a Google Search Console CSV or click Load Demo Data.'}),
            h('div',{style:{marginTop:16}},h(Uploader,{
              label:'Drop GSC CSV export here',
              hint:'Expected columns: Query, Clicks, Impressions, CTR, Position',
              onParsed:(rows,fields)=>{
                const f=n=>fields.find(x=>n.some(m=>x.toLowerCase().includes(m)));
                setData(rows.map(r=>({
                  query:r[f(['query'])]||r[Object.keys(r)[0]]||'',
                  clicks:+(r[f(['click'])]||0),
                  impressions:+(r[f(['impress'])]||0),
                  ctr:parseFloat(r[f(['ctr'])]||0),
                  position:parseFloat(r[f(['position','pos'])]||0),
                })));
              }
            }))
          )
        :h(Fragment,null,
            h('div',{className:'ow'},
              h('table',null,
                h('thead',null,h('tr',null,h('th',null,'Query'),TH('clicks','Clicks'),TH('impressions','Impressions'),TH('ctr','CTR'),TH('position','Position'))),
                h('tbody',null,...paged.map((r,i)=>h('tr',{key:i},
                  h('td',{className:'trunc',style:{maxWidth:280}},r.query),
                  h('td',{className:'mn'},fmtN(+r.clicks||0)),
                  h('td',{className:'mn'},fmtN(+r.impressions||0)),
                  h('td',{className:'mn'},fmtP(+r.ctr||0)),
                  h('td',{className:'mn'},(+r.position||0).toFixed(1))
                )))
              )
            ),
            h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:12,fontSize:11,color:'#64748b'}},
              h('span',null,`Showing ${pg*PER+1}–${Math.min((pg+1)*PER,rows.length)} of ${fmtN(rows.length)}`),
              h('div',{style:{display:'flex',gap:8}},
                h('button',{className:'btn btn-s btn-sm',disabled:pg===0,onClick:()=>setPg(p=>p-1)},'← Prev'),
                h('button',{className:'btn btn-s btn-sm',disabled:pg>=pages-1,onClick:()=>setPg(p=>p+1)},'Next →')
              )
            ),
            h('button',{className:'btn btn-s btn-sm mt3',onClick:()=>setData([])},'Clear Data')
          )
    )
  );
}

// ── Paid Media ────────────────────────────────────────────────────────────────
function PaidView({cfg,paidData,setPaidData,crm,setCrm}){
  const [crmTxt,setCrmTxt]=useState('');
  const [crmErr,setCrmErr]=useState('');
  const isEst=cfg.revenueModel!=='ecommerce';

  const tot=useMemo(()=>({
    spend:paidData.reduce((s,r)=>s+(+r.spend||0),0),
    conv:paidData.reduce((s,r)=>s+(+r.conversions||0),0),
    val:paidData.reduce((s,r)=>s+(+r.conversionValue||0),0),
  }),[paidData]);

  const roas=tot.spend?tot.val/tot.spend:0;
  const crmROI=crm&&tot.spend?crm.revenue/tot.spend:0;
  const gapPct=crm&&tot.val?Math.abs(1-crm.revenue/tot.val)*100:0;
  const showGap=gapPct>(cfg.gapThreshold||20);

  const importCRM=()=>{
    setCrmErr('');
    try{const p=JSON.parse(crmTxt);setCrm(p);}
    catch{
      Papa.parse(crmTxt.trim(),{header:true,complete:r=>{
        if(r.data&&r.data.length){
          const row=r.data[0];
          const g=k=>+(Object.entries(row).find(([rk])=>rk.toLowerCase().includes(k))?.[1]||0);
          setCrm({leads:g('lead'),mqls:g('mql'),sqls:g('sql'),closedWon:g('closed'),revenue:g('revenue')});
        }else setCrmErr('Could not parse. Use JSON or CSV format.');
      }});
    }
  };

  return h('div',{className:'sy5',style:{paddingTop:16}},
    h('div',{className:'kpi-grid5'},
      h(KPI,{label:'Total Ad Spend',value:fmt$(tot.spend)}),
      h(KPI,{label:'ROAS',value:fmtX(roas),hl:true,badge:h(Badge,{type:'attr'},'Platform'),tip:'Platform Conversion Value ÷ Total Spend'}),
      h(KPI,{label:'Blended CRM ROI',value:crm?fmtX(crmROI):'—',badge:crm?h(Badge,{type:isEst?'est':'attr'},isEst?'Est.':'Attr.'):null,tip:'CRM Closed Revenue ÷ Total Ad Spend'}),
      h(KPI,{label:'Conversions (Platform)',value:fmtN(tot.conv)}),
      h(KPI,{label:'Attribution Gap',value:crm?fmtP(gapPct):'—',badge:showGap?h(Badge,{type:'gap'},'Alert'):null,tip:'Gap between platform-reported and CRM-confirmed revenue'})
    ),

    showGap&&crm&&h('div',{className:'alert alert-r'},
      h('div',{className:'alert-icon'},'⚠️'),
      h('div',null,
        h('div',{className:'at-red'},`Attribution Gap Detected: ${fmtP(gapPct)}`),
        h('div',{className:'alert-body'},
          `Platform reports ${fmt$(tot.val)} in conversion value, but CRM shows ${fmt$(crm.revenue)} in closed revenue. `,
          `Gap of ${fmt$(tot.val-crm.revenue)}. Review attribution windows and cross-device tracking.`
        )
      )
    ),

    h('div',{className:'grid2'},
      h(Card,{title:'Platform Campaign Data'},
        paidData.length===0
          ?h(Fragment,null,
              h(Empty,{icon:'📊',title:'No platform data',desc:'Upload a Google Ads or Meta Ads CSV export.'}),
              h('div',{style:{marginTop:16}},h(Uploader,{
                label:'Drop platform CSV here',
                hint:'Columns: Campaign, Impressions, Clicks, Spend, Conversions, Conversion Value',
                onParsed:(rows,fields)=>{
                  const f=n=>fields.find(x=>n.some(m=>x.toLowerCase().includes(m)));
                  setPaidData(rows.map(r=>({
                    campaign:r[f(['campaign','name'])]||'',
                    platform:r[f(['platform','network','source'])]||'Platform',
                    impressions:+(r[f(['impress'])]||0),
                    clicks:+(r[f(['click'])]||0),
                    spend:parseFloat(r[f(['spend','cost','amount'])]||0),
                    conversions:+(r[f(['conversion'])]||0),
                    conversionValue:parseFloat(r[f(['value','revenue'])]||0),
                  })));
                }
              }))
            )
          :h(Fragment,null,
              h('div',{className:'ow'},
                h('table',null,
                  h('thead',null,h('tr',null,h('th',null,'Campaign'),h('th',null,'Platform'),h('th',null,'Spend'),h('th',null,'Conv.'),h('th',null,'Conv. Value'),h('th',null,'ROAS'))),
                  h('tbody',null,...paidData.map((r,i)=>h('tr',{key:i},
                    h('td',{className:'trunc',style:{maxWidth:160}},r.campaign),

                  )))
                )
              ),
              h('button',{className:'btn btn-s btn-sm mt3',onClick:()=>setPaidData([])},'Clear Data')
            )
      ),

      h(Card,{title:'CRM Data'},
        crm
          ?h('div',{className:'sy4'},
              h('div',{className:'g2'},
                ...([['Leads',crm.leads],['MQLs',crm.mqls],['SQLs',crm.sqls],['Closed Won',crm.closedWon]].map(([l,v])=>
                  h('div',{key:l,className:'kpi-card'},h('div',{className:'kpi-label'},l),h('div',{className:'kpi-val',style:{fontSize:18}},fmtN(v)))
                ))
              ),
              h('div',{className:'kpi-card hl',style:{marginTop:12}},
                h('div',{className:'kpi-label'},'CRM Closed Revenue',isEst&&h(Badge,{type:'est'},'Est.')),

              h('button',{className:'btn btn-p',style:{marginTop:8},onClick:importCRM},'Import CRM Data')
            )
      )
    )
  );
}

// ── Email ─────────────────────────────────────────────────────────────────────
function EmailView({cfg,emailData,setEmailData}){
  const tot=useMemo(()=>({

    rev:emailData.reduce((s,r)=>s+(+r.revenue||0),0),

  const or=tot.sends?tot.opens/tot.sends*100:0;
  const cr=tot.sends?tot.clicks/tot.sends*100:0;
  const rps=tot.sends&&tot.rev?tot.rev/tot.sends:0;
  const hasAttr=tot.rev>0;
  const estRev=tot.clicks*(cfg.convRate/100)*cfg.aov;
  const dispRev=hasAttr?tot.rev:estRev;
  const isEst=!hasAttr||cfg.revenueModel!=='ecommerce';

    h('div',{className:'grid3'},
      h('div',{className:'section-card',style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}},
        h(Gauge,{score:health,size:140}),
        emailData.length>0&&h('div',{style:{width:'100%',fontSize:11}},
          h('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:6}},
            h('span',{style:{color:'#64748b'}},'Open Rate'),

function ExecSummary({cfg,projections}){
  const p=projections;
  const factors=[
    {ok:true,                             label:p.historyMonths+' months of search performance data loaded',pts:25},
    {ok:p.historyMonths>=13,              label:'13+ months enables year-over-year accuracy',pts:20},
    {ok:p.hasRevenueData,                 label:'Revenue data loaded — RPS from actuals, not estimates',pts:20},

    {ok:p.seasonalityEnabled,             label:'Seasonal patterns applied to projections',pts:10},

  const score=factors.reduce((s,f)=>s+(f.ok?f.pts:0),0);
  const confLabel=score>=80?'High Confidence':score>=60?'Moderate Confidence':'Limited Data';
  const confColor=score>=80?'#22c55e':score>=60?'#f59e0b':'#ef4444';

  const hasRev=p.rps>0;
  const showROI=hasRev&&p.seoCost>0;
  const modROI=p.seoCost>0?p.moderateRevenue/p.seoCost:null;

function Summary({cfg,gsc,paid,crm,email,projections}){
  const isEst=cfg.revenueModel!=='ecommerce';
  const rpc=cfg.revenueModel==='leadgen'?cfg.dealValue*(cfg.closeRate/100):cfg.aov;
  const COLORS=['#3b82f6','#8b5cf6','#22c55e'];

  const seoRev=gsc.reduce((s,r)=>s+(+r.clicks||0),0)*(cfg.convRate/100)*rpc;
  const paidRev=crm?crm.revenue:paid.reduce((s,r)=>s+(+r.conversionValue||0),0);
  const paidSpend=paid.reduce((s,r)=>s+(+r.spend||0),0);
  const emailAttr=email.reduce((s,r)=>s+(+r.revenue||0),0);
  const emailClicks=email.reduce((s,r)=>s+(+r.clicks||0),0);
  const emailRev=emailAttr>0?emailAttr:emailClicks*(cfg.convRate/100)*cfg.aov;

  const ret={
    seo:cfg.retainerMode==='split'?(cfg.retainer.seo||0):Math.floor((cfg.retainer.total||0)/3),
    paid:cfg.retainerMode==='split'?(cfg.retainer.paid||0):paidSpend||Math.floor((cfg.retainer.total||0)/3),
    email:cfg.retainerMode==='split'?(cfg.retainer.email||0):Math.floor((cfg.retainer.total||0)/3),

  const channels=[
    {key:'seo',name:'Organic SEO',rev:cfg.channels.seo?seoRev:0,ret:ret.seo,est:isEst,col:COLORS[0]},

  const copy=()=>{

      ...channels.filter(c=>c.rev>0).map(c=>`  ${c.name}: ${fmt$(c.rev)} (${totalRev?fmtP(c.rev/totalRev*100):'0%'})`),

      h(KPI,{label:'Total Revenue',value:fmt$(totalRev),hl:true,badge:h(Badge,{type:isEst?'est':'attr'},isEst?'Est.':'Attr.')}),
      h(KPI,{label:'Blended ROI',value:fmtX(blended),hl:true,tip:'Total Revenue ÷ Total Retainer'}),
      h(KPI,{label:'Total Retainer',value:fmt$(totalRet)}),
      h(KPI,{label:'Active Channels',value:Object.values(cfg.channels).filter(Boolean).length.toString()})
    ),

    !hasData&&h('div',{className:'section-card',style:{textAlign:'center',padding:48}},
      h('div',{style:{fontSize:36,marginBottom:12}},'📈'),
      h('div',{style:{fontWeight:500,color:'#94a3b8',marginBottom:6}},'No revenue data yet'),
      h('div',{style:{fontSize:13,color:'#64748b'}},'Load data in the channel tabs or click Load Demo Data.')
    ),

    hasData&&h(Fragment,null,
      h('div',{className:'grid2'},
        h(Card,{title:'Channel Revenue Breakdown'},
          h('table',null,
            h('thead',null,h('tr',null,
              h('th',null,'Channel'),h('th',null,'Revenue'),h('th',null,'% of Total'),h('th',null,'Type'),
              cfg.retainerMode==='split'&&h('th',null,'Channel ROI')
            )),
            h('tbody',null,
              ...channels.map((c,i)=>h('tr',{key:i},
                h('td',null,h('span',{style:{display:'inline-block',width:8,height:8,borderRadius:'50%',background:c.col,marginRight:8}}),c.name),
                h('td',{className:'mn'},fmt$(c.rev)),
                h('td',{className:'mn'},totalRev?fmtP(c.rev/totalRev*100):'—'),
                h('td',null,h(Badge,{type:c.est?'est':'attr'},c.est?'Est.':'Attr.')),
                cfg.retainerMode==='split'&&h('td',{className:'mn'},c.ret?fmtX(c.rev/c.ret):'—')

              h('tr',{style:{borderTop:'2px solid #252d40'}},
                h('td',{style:{fontWeight:600}},'Total'),
                h('td',{className:'mn',style:{color:'#3b82f6',fontWeight:600}},fmt$(totalRev)),

      h('div',{style:{display:'flex',gap:12,flexWrap:'wrap'}},

// ── GA4 CSV parser ────────────────────────────────────────────────────────────
function readFileAsText(file,callback){
  var isXlsx=/\.xlsx?$/i.test(file.name);
  var rdr=new FileReader();
  if(isXlsx){
    rdr.onload=function(ev){
      try{
        var wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array'});
        var ws=wb.Sheets[wb.SheetNames[0]];
        callback(XLSX.utils.sheet_to_csv(ws));
      }catch(ex){callback(null);}
    };
    rdr.readAsArrayBuffer(file);
  }else{
    rdr.onload=function(ev){callback(ev.target.result);};
    rdr.readAsText(file);
  }
}

function parseGA4Csv(text,hint){
  var lines=text.split('\n').map(function(l){return l.trim();}).filter(function(l){return l.length>0&&!l.startsWith('#');});
  if(lines.length<2)return null;
  function sc(line){var out=[],cur='',q=false;for(var i=0;i<line.length;i++){var c=line[i];if(c==='"'){q=!q;}else if(c===','&&!q){out.push(cur.trim());cur='';}else{cur+=c;}}out.push(cur.trim());return out;}
  var hdr=sc(lines[0]);
  var dIdx=hdr.findIndex(function(h){return/month|date|period|week/i.test(h);});
  if(dIdx===-1)dIdx=0;
  // "clicks" added so GSC exports are matched for the sessions slot
  var pats={sessions:/sessions|users|visits|clicks/i,revenue:/revenue|income|sales/i,conversions:/conv|event|goal/i};
  var pat=(hint&&pats[hint])||null;
  var valIdx=pat?hdr.findIndex(function(h,ci){return ci!==dIdx&&pat.test(h);}): -1;
  if(valIdx===-1){
    hdr.forEach(function(h,ci){if(valIdx===-1&&ci!==dIdx&&lines.slice(1,4).some(function(l){var r=sc(l);return r[ci]&&!isNaN(parseFloat(r[ci].replace(/[$,]/g,'')));}))valIdx=ci;});
  }
  if(valIdx===-1)return null;
  var MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],parsed=[];
  lines.slice(1).forEach(function(line){
    var r=sc(line);
    if(r.length<=Math.max(dIdx,valIdx))return;
    var d=r[dIdx].trim(),v=parseFloat(r[valIdx].replace(/[$,]/g,''));
    if(isNaN(v))return;
    parsed.push({d:d,v:v});
  });
  if(!parsed.length)return null;
  // GSC exports daily dates (YYYY-MM-DD) — aggregate to monthly totals
  var isDaily=parsed.some(function(p){return/^\d{4}-\d{2}-\d{2}$/.test(p.d);});
  var out=[];
  if(isDaily){
    var monthly={},order=[];
    parsed.forEach(function(p){
      var mk=p.d.slice(0,7);
      if(!monthly[mk]){monthly[mk]=0;order.push(mk);}
      monthly[mk]+=p.v;
    });
    order.forEach(function(mk){
      var yr=parseInt(mk.slice(0,4)),mi=parseInt(mk.slice(5,7))-1;
      out.push(MO[mi]+'-'+String(yr).slice(2)+'\t'+Math.round(monthly[mk]));
    });
  }else{
    parsed.forEach(function(p){
      var lbl=p.d,m=p.d.match(/^(\d{4})-(\d{2})$/);
      if(m){var yr=parseInt(m[1]),mi=parseInt(m[2])-1;if(mi>=0&&mi<12)lbl=MO[mi]+'-'+String(yr).slice(2);}
      out.push(lbl+'\t'+p.v);
    });
  }
  return out.length>=2?out.join('\n'):null;
}

  $('tr-mode-leads').addEventListener('click',function(){setMode('leads');});
  $('tr-view-incremental').addEventListener('click',function(){setView('incremental');});
  $('tr-view-total').addEventListener('click',function(){setView('total');});
  $('tr-ta-baseline').addEventListener('input',function(){hBase();maybeRerun();});
  $('tr-ta-baseline-rev').addEventListener('input',function(){hBaseRev();maybeRerun();});
  $('tr-ta-baseline-conv').addEventListener('input',function(){hBaseConv();maybeRerun();});
  $('tr-ta-actuals').addEventListener('input',function(){hActuals();maybeRerun();});
  $('tr-ta-actuals-rev').addEventListener('input',function(){hActualsRev();maybeRerun();});
  $('tr-ta-actuals-conv').addEventListener('input',function(){hActualsConv();maybeRerun();});
  $('tr-conv-value').addEventListener('input',function(){updateRPS();maybeRerun();});
  $('tr-btn-run').addEventListener('click',run);
  $('tr-btn-export').addEventListener('click',exportCSV);
  $('tr-cfg-rps').addEventListener('input',function(){this.dataset.userEdited=this.value?'1':'';maybeRerun();});
  $('tr-cfg-months').addEventListener('input',function(){this.dataset.userEdited=this.value?'1':'';maybeRerun();});
  $('tr-cfg-monthly').addEventListener('input',function(){this.dataset.userEdited=this.value?'1':'';maybeRerun();});
  ['tr-cfg-brand-pct','tr-cfg-nonbrand-pct','tr-cfg-brand-weight'].forEach(function(id){container.querySelector('#'+id).addEventListener('input',function(){updateBlended();maybeRerun();});});
  function loadCsvTr(fileId,taId,stId,hint,handler){
    var inp=$(fileId);
    var box=inp.closest('.input-box');
    function handle(f){
      if(!f)return;
      readFileAsText(f,function(text){
        if(!text){$(stId).innerHTML='<span class="err">Could not read file.</span>';inp.value='';return;}
        var out=parseGA4Csv(text,hint);
        if(!out){$(stId).innerHTML='<span class="err">Could not detect columns — try pasting instead.</span>';inp.value='';return;}
        $(taId).value=out;$(taId).dispatchEvent(new Event('input'));inp.value='';
      });
    }
    inp.addEventListener('change',function(e){handle(e.target.files&&e.target.files[0]);});
    if(box){
      box.addEventListener('dragover',function(e){e.preventDefault();box.classList.add('drop-active');});
      box.addEventListener('dragleave',function(e){if(!box.contains(e.relatedTarget))box.classList.remove('drop-active');});
      box.addEventListener('drop',function(e){e.preventDefault();box.classList.remove('drop-active');handle(e.dataTransfer.files&&e.dataTransfer.files[0]);});
    }
  }
  loadCsvTr('tr-file-baseline','tr-ta-baseline','tr-st-baseline','sessions');
  loadCsvTr('tr-file-baseline-rev','tr-ta-baseline-rev','tr-st-baseline-rev','revenue');
  loadCsvTr('tr-file-baseline-conv','tr-ta-baseline-conv','tr-st-baseline-conv','conversions');
  loadCsvTr('tr-file-actuals','tr-ta-actuals','tr-st-actuals','sessions');
  loadCsvTr('tr-file-actuals-rev','tr-ta-actuals-rev','tr-st-actuals-rev','revenue');
  loadCsvTr('tr-file-actuals-conv','tr-ta-actuals-conv','tr-st-actuals-conv','conversions');
}

// ── SEO Funnel ────────────────────────────────────────────────────────────────
function FunnelView(){
  const [bl,setBl]=useState({imp:'',clk:'',ctr:'',pos:'',sess:'',conv:'',rev:''});
  const [ca,setCa]=useState({imp:'',clk:'',ctr:'',pos:'',sess:'',conv:'',rev:''});
  const [monthly,setMonthly]=useState('');
  const [mos,setMos]=useState('12');
  const [shown,setShown]=useState(false);
  useEffect(()=>{
    if(roiBridge.seoCost)setMonthly(String(roiBridge.seoCost));
    return roiBridge.onCfg(d=>{setMonthly(m=>m||String(d.seoCost||''));});
  },[]);
  const N=v=>parseFloat(String(v||0).replace(/[^0-9.-]/g,''))||0;
  const fK=v=>v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':Math.round(v).toLocaleString();
  const f$=v=>v>=1e6?'$'+(v/1e6).toFixed(2)+'M':v>=1e3?'$'+(v/1e3).toFixed(0)+'K':'$'+Math.round(v).toLocaleString();
  const fPct=v=>v===null?'—':(v>=0?'+':'')+v.toFixed(0)+'%';
  const pct=(a,b)=>b>0?((a-b)/b*100):null;
  function derive(d){
    const imp=N(d.imp),clk=N(d.clk),ctr=N(d.ctr),sess=N(d.sess),conv=N(d.conv),rev=N(d.rev),pos=N(d.pos);
    const effClk=clk||(imp&&ctr?Math.round(imp*ctr/100):0);
    const effCtr=ctr||(imp&&effClk?effClk/imp*100:0);
    const effSess=sess||effClk;
    const cvr=effSess&&conv?conv/effSess*100:0;
    return{imp,clk:effClk,ctr:effCtr,sess:effSess,conv,rev,cvr,rpc:conv&&rev?rev/conv:0,pos};
  }
  const B=derive(bl),C=derive(ca);
  const hasData=(B.imp||B.clk||B.sess)&&(C.imp||C.clk||C.sess);
  const totalCost=N(monthly)*N(mos);
  const incrRev=C.rev-B.rev;
  const roi=totalCost>0&&incrRev>0?incrRev/totalCost:null;
  const stages=[
    {key:'imp',lbl:'Impressions',bl:B.imp,ca:C.imp,note:B.pos||C.pos?`Avg position: ${B.pos?B.pos.toFixed(1):'—'} → ${C.pos?C.pos.toFixed(1):'—'}`:'Organic search impressions (GSC)'},
    {key:'clk',lbl:'Clicks',bl:B.clk,ca:C.clk,note:`CTR: ${B.ctr.toFixed(1)}% → ${C.ctr.toFixed(1)}%`},
    {key:'sess',lbl:'Sessions',bl:B.sess,ca:C.sess,note:'Organic sessions — GA4'},
    {key:'conv',lbl:'Conversions',bl:B.conv,ca:C.conv,note:`CVR: ${B.cvr.toFixed(1)}% → ${C.cvr.toFixed(1)}%`},
    ...(B.rev||C.rev?[{key:'rev',lbl:'Revenue',bl:B.rev,ca:C.rev,isMoney:true,note:`Avg value: ${f$(C.rpc)}/conv`}]:[])
  ].filter(s=>s.bl>0||s.ca>0);
  const inp=(lbl,val,setFn,pfx)=>h('div',{className:'f-field'},
    h('label',null,lbl),
    h('div',{className:'f-input-wrap'},
      pfx&&h('span',{className:'f-prefix'},pfx),
      h('input',{type:'number',value:val,min:0,onChange:e=>setFn(e.target.value),placeholder:'0'})
    )
  );
  const pcol=(title,color,d,set)=>h('div',{className:'f-period'},
    h('div',{className:'f-period-title',style:{borderColor:color}},title),
    h('div',{className:'f-group-label'},'Google Search Console'),
    h('div',{className:'f-group'},
      inp('Impressions',d.imp,v=>set(p=>({...p,imp:v}))),
      inp('Clicks',d.clk,v=>set(p=>({...p,clk:v}))),
      inp('Avg CTR %',d.ctr,v=>set(p=>({...p,ctr:v}))),
      inp('Avg Position',d.pos,v=>set(p=>({...p,pos:v})))
    ),
    h('div',{className:'f-group-label'},'Google Analytics 4'),
    h('div',{className:'f-group'},
      inp('Sessions',d.sess,v=>set(p=>({...p,sess:v}))),
      inp('Conversions',d.conv,v=>set(p=>({...p,conv:v}))),
      inp('Revenue',d.rev,v=>set(p=>({...p,rev:v})),'$')
    )
  );
  const fst=s=>{
    const max=Math.max(s.bl,s.ca)||1,blW=s.bl/max*100,caW=s.ca/max*100,d=pct(s.ca,s.bl);
    const disp=v=>s.isMoney?f$(v):fK(v);
    return h('div',{key:s.key,className:'fstage'},
      h('div',{className:'fstage-label'},s.lbl),
      h('div',{className:'fstage-bars'},
        h('div',{className:'fbar-row'},h('div',{className:'fbar campaign',style:{width:caW+'%'}}),h('span',{className:'fbar-val'},disp(s.ca))),
        h('div',{className:'fbar-row'},h('div',{className:'fbar baseline',style:{width:blW+'%'}}),h('span',{className:'fbar-val muted'},disp(s.bl)))
      ),
      h('div',{className:'fstage-right'},
        h('div',{className:'fstage-delta',style:{color:d!==null&&d>=0?'#1D9E75':'#D85A30'}},fPct(d)),
        h('div',{className:'fstage-note'},s.note)
      )
    );
  };
  return h('div',{className:'funnel-panel sy5',style:{paddingTop:16}},
    h('div',{className:'f-input-grid'},
      pcol('Baseline period','#64748b',bl,setBl),
      pcol('Campaign period','#3b82f6',ca,setCa)
    ),
    h('div',{className:'f-cost-row'},
      h('div',{className:'f-cost-field'},
        h('label',null,'Monthly SEO cost'),
        h('div',{className:'f-input-wrap'},h('span',{className:'f-prefix'},'$'),h('input',{type:'number',value:monthly,min:0,onChange:e=>setMonthly(e.target.value),placeholder:'0'}))
      ),
      h('div',{className:'f-cost-field'},
        h('label',null,'Campaign duration (months)'),
        h('input',{className:'f-plain-input',type:'number',value:mos,min:1,onChange:e=>setMos(e.target.value),placeholder:'12'})
      ),
      h('button',{className:'btn btn-p',style:{alignSelf:'flex-end'},onClick:()=>setShown(true)},'Calculate Funnel')
    ),
    shown&&hasData&&h(Fragment,null,
      h('div',{className:'f-legend'},
        h('span',null,h('span',{className:'f-dot',style:{background:'#3b82f6'}}),'Campaign period'),
        h('span',null,h('span',{className:'f-dot',style:{background:'#334155'}}),'Baseline period')
      ),
      h('div',{className:'f-stages'},stages.map(fst)),
      h('div',{className:'f-roi-grid'},
        h(KPI,{label:'Total SEO investment',value:f$(totalCost),sub:'$'+N(monthly).toLocaleString()+'/mo × '+mos+' mo'}),
        (B.rev>0||C.rev>0)&&h(KPI,{label:'Incremental revenue',value:(incrRev>=0?'+':'')+f$(incrRev),hl:incrRev>0,sub:'campaign − baseline period'}),
        roi&&h(KPI,{label:'Return on SEO spend',value:roi.toFixed(2)+'x',hl:true,sub:'per $1 invested'}),
        B.conv>0&&C.conv>0&&h(KPI,{label:'Incremental conversions',value:'+'+(Math.round(C.conv-B.conv)).toLocaleString(),sub:'campaign − baseline period'})
      )
    ),
    (!shown||!hasData)&&h('div',{className:'section-card',style:{marginTop:4,textAlign:'center',padding:40}},
      h('div',{style:{fontSize:32,marginBottom:12}},'🔽'),
      h('div',{style:{fontWeight:500,color:'#94a3b8',marginBottom:6}},'Full funnel — baseline vs campaign'),
      h('div',{style:{fontSize:12,color:'#64748b'}},'Enter GSC + GA4 data for both periods, then click Calculate. Clicks/CTR are mutually derived if one is missing.')
    )
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [tab,setTab]=useState('setup');
  const [demo,setDemo]=useState(false);
  const [cfg,setCfg]=useState({
    clientName:'',industry:'ecommerce',revenueModel:'ecommerce',
    aov:150,convRate:2.5,dealValue:5000,closeRate:20,sqlRate:30,
    ctrPreset:'ecommerce',gapThreshold:20,
    benchmarkOpen:20,benchmarkClick:2.5,
    retainerMode:'total',retainer:{total:12000,seo:4000,paid:5000,email:3000},
    channels:{seo:true,paid:true,email:true}
  });
  const [gsc,setGsc]=useState([]);
  const [paid,setPaid]=useState([]);
  const [crm,setCrm]=useState(null);
  const [email,setEmail]=useState([]);
  const [projections,setProjections]=useState(null);
  useEffect(()=>{
    const seoCost=cfg.retainerMode==='split'?(cfg.retainer.seo||0):Math.floor((cfg.retainer.total||0)/3);
    roiBridge.pushCfg({seoCost});
  },[cfg.retainerMode,cfg.retainer]);
  useEffect(()=>roiBridge.onProjections(setProjections),[]);

  const loadDemo=()=>{
    const d=makeDemo();
    setCfg(c=>({...c,clientName:'Apex Running Co.',industry:'fitness',revenueModel:'ecommerce',aov:150,convRate:2.5}));
    setGsc(d.gsc);setPaid(d.paid);setCrm(d.crm);setEmail(d.email);
    setDemo(true);
    // Push representative projections so Executive Brief populates immediately
    roiBridge.pushProjections({
      moderateSessions:24600,moderateRevenue:123000,
      aggressiveSessions:36900,aggressiveRevenue:184500,
      rps:5.00,seoCost:48000,seoCostMonthly:4000,months:12,endLabel:'Dec-25',
      yoyGrowth:0.12,lastMonthSessions:38500,lastMonthLabel:'Dec-24',
      historyMonths:24,hasRevenueData:true,hasConvData:false,seasonalityEnabled:true,
      breakEvenMod:'Mar-25',breakEvenAgg:'Feb-25'
    });
  };

  const TABS=[
    {id:'setup',lbl:'⚙ Setup'},
    {id:'seo',lbl:'🔍 Organic SEO'},
    {id:'traffic',lbl:'📈 Traffic Forecast'},
    {id:'tracker',lbl:'🎯 SEO Tracker'},
    {id:'funnel',lbl:'🔽 Funnel'},
    {id:'paid',lbl:'💰 Paid Media'},
    {id:'email',lbl:'📧 Email'},
    {id:'summary',lbl:'📊 ROI Summary'},
  ];

  return h('div',{style:{minHeight:'100vh'}},
    h('header',{className:'app-header'},
      h('div',{style:{display:'flex',alignItems:'center',gap:8}},
        h('span',{className:'logo'},'ROI ',h('span',{className:'logo-a'},'Machine')),
        cfg.clientName&&h('span',{style:{fontSize:13,color:'#64748b'}},'/ '+cfg.clientName)
      ),
      h('div',{style:{display:'flex',alignItems:'center',gap:12}},
        demo&&h('span',{style:{fontSize:11,color:'#64748b',border:'1px solid #252d40',padding:'3px 8px',borderRadius:4}},'Demo Data Active'),
        h('button',{className:'btn btn-ok',onClick:loadDemo},'Load Demo Data')
      )
    ),
    h('nav',{className:'app-nav'},
      ...TABS.map(t=>h('button',{key:t.id,className:'nav-tab'+(tab===t.id?' active':''),onClick:()=>setTab(t.id)},t.lbl))
    ),
    h('main',{className:'app-main'},
      tab==='setup'&&h(Setup,{cfg,setCfg}),
      tab==='seo'&&h(SEOView,{cfg,data:gsc,setData:setGsc}),
      tab==='traffic'&&h(TrafficForecastView,null),
      tab==='tracker'&&h(SEOTrackerView,null),
      tab==='funnel'&&h(FunnelView,null),
      tab==='paid'&&h(PaidView,{cfg,paidData:paid,setPaidData:setPaid,crm,setCrm}),
      tab==='email'&&h(EmailView,{cfg,emailData:email,setEmailData:setEmail}),
      tab==='summary'&&h(Summary,{cfg,gsc,paid,crm,email,projections})
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
